name: Build & Deploy Dashboard Pages

on:
  push:
    branches:
      - main
    paths:
      - "fed-reaction-dashboard/fed_reaction_dashboard.md"
      - "fed-reaction-dashboard/data/**"
      - "fed-reaction-dashboard/scripts/build_site.py"
      - ".github/workflows/build-pages.yml"
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-pages:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fed-reaction-dashboard

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build website
        run: python scripts/build_site.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: fed-reaction-dashboard/docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
